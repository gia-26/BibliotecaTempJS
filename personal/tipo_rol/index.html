<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Configurar Tipos de Rol</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>

<body>

    <div class="modal-container">

        <div class="modal-card">

            <!-- HEADER -->
            <div class="modal-header">
                <h2>Configurar Tipos de Rol</h2>
                <button class="cerrar-modal" onclick="window.parent.closeModal('modal-roles')">×</button>
            </div>

            <!-- BODY -->
            <div class="modal-body">

                <div id="mensajeExito" class="alert-success" style="display:none;"></div>

                <p class="label-strong">Tipos de rol existentes:</p>

                <!-- Lista de roles -->
                <div id="listaRoles" class="lista-items"></div>

                <!-- Formulario -->
                <form id="formRol" class="form-principal">

                    <label class="label-strong">Nombre del rol:</label>
                    <input type="text" id="nombreRol" placeholder="Nuevo tipo de rol">
                    <input type="hidden" id="idRol">

                    <div class="botones">
                        <button type="button" id="cancelarBtn" class="btn btn-secundario">Cancelar</button>
                        <button type="submit" class="btn btn-primario">Guardar</button>
                    </div>

                </form>

            </div>

        </div>

    </div>

    <script src="main.js"></script>
</body>

</html>
