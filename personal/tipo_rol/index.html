<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Configurar Tipos de Rol</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        crossorigin="anonymous" />
</head>

<body>

    <div class="modal-container">

        <div class="modal-card">

            <div class="modal-header">
                <h2>Configurar Tipos de Rol</h2>
                <span class="cerrar">×</span>
            </div>

            <div class="modal-body">

                <div id="mensajeExito" class="alert-success" style="display:none;"></div>

                <p class="label-strong">Tipos de rol existentes:</p>

                <div id="listaRoles" class="lista-items">
                    <!-- aquí carga JS -->
                </div>

                <h3 id="tituloForm">Agregar tipo de rol</h3>

                <form id="formRol" class="form-principal">

                    <label class="label-strong">Nombre del rol:</label>

                    <input type="text" id="nombreRol" placeholder="Nuevo tipo de rol">

                    <input type="hidden" id="idRol">

                    <div class="botones">

                        <button type="button" id="cancelarBtn" class="btn btn-secundario">
                            Cancelar
                        </button>

                        <button type="submit" class="btn btn-primario">
                            Agregar
                        </button>

                    </div>

                </form>

            </div>
        </div>
    </div>

    <script src="main.js"></script>

</body>

</html>
