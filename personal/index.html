<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal - Biblioteca UTHH</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div id="header"></div>

  <section class="hero">
    <h2>Gestión de Personal</h2>
  </section>

  <div id="header-dashboard"></div>

  <main>
    <div class="search-section">
      <div class="search-box">
        <span class="search-label">Buscar personal ID:</span>
        <input type="text" id="inpSearch" class="search-input" placeholder="Ingresa ID del personal...">
      </div>
    </div>

    <div class="table-container">
      <div class="tabla-scroll">
        <table class="catalog-table">
          <thead>
            报
              <th>Id personal</th>
              <th>Nombre</th>
              <th>Apellido paterno</th>
              <th>Apellido materno</th>
              <th>Rol</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tblPersonal">
          </tbody>
        </table>
      </div>
    </div>

    <div class="form-section">
      <h3 class="section-title">Personal bibliotecario</h3>
      <form class="personal-form" id="formPersonal">
        <div class="form-group">
          <label class="form-label" for="noTrabajador">No. Trabajador</label>
          <input type="text" class="form-input" id="noTrabajador">
        </div>

        <div class="form-group">
          <label class="form-label" for="idPersonal">ID personal</label>
          <input type="text" class="form-input" id="idPersonal" readonly>
        </div>

        <div class="form-group">
          <label class="form-label" for="nombre">Nombre</label>
          <input type="text" class="form-input" id="nombre" readonly>
        </div>

        <div class="form-group">
          <label class="form-label" for="apellidoP">Apellido paterno</label>
          <input type="text" class="form-input" id="apellidoP" readonly>
        </div>

        <div class="form-group">
          <label class="form-label" for="apellidoM">Apellido materno</label>
          <input type="text" class="form-input" id="apellidoM" readonly>
        </div>

        <div class="form-group">
          <label class="form-label" for="slcTiposRol">
            Tipo de rol:
            <button type="button" class="config-btn" onclick="openModal('modal-tipos-rol')"
              title="Configurar tipos de rol">
              <i class="fas fa-cog"></i>
            </button>
          </label>
          <select class="form-select" id="slcTiposRol">
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <div class="password-wrapper">
            <input type="password" class="form-input" placeholder="Ingresa contraseña" id="password">
            <button type="button" class="toggle-password" id="togglePassword">
              <i class="fa-solid fa-eye-slash"></i>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password-confirm">Confirmar contraseña</label>
          <div class="password-wrapper">
            <input type="password" class="form-input" placeholder="Confirma contraseña" id="password-confirm">
            <button type="button" class="toggle-password" id="togglePasswordConfirm">
              <i class="fa-solid fa-eye-slash"></i>
            </button>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="limpiar()">Limpiar</button>
          <button id="btnEditar" type="button" class="btn">Editar</button>
          <button id="btnGuardar" type="button" class="btn">Guardar</button>
        </div>
      </form>
    </div>
  </main>

  <!-- Modal Tipos de Rol -->
  <div id="modal-tipos-rol" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Configurar Tipos de Rol</h2>
        <span class="close" onclick="closeModal('modal-tipos-rol')">&times;</span>
      </div>

      <div class="modal-body" style="padding: 16px 18px 20px;">
        <div id="mensajeExitoRoles" class="alert-success" style="display:none;"></div>

        <p class="label-strong">Tipos de rol existentes:</p>

        <div id="listaRoles" class="lista-items"></div>

        <h3 id="tituloFormRol" style="font-size: 16px; font-weight: 600; margin: 12px 0 8px; color: #3B2423;">Agregar tipo de rol</h3>

        <form id="formRol" class="form-principal">
          <label class="label-strong">Nombre del rol:</label>
          <input type="text" id="nombreRol" placeholder="Nuevo tipo de rol">
          <input type="hidden" id="idRol">

          <div class="botones" style="display: flex; gap: 10px; margin-top: 8px;">
            <button type="button" id="cancelarBtnRol" class="btn btn-secundario">Cancelar</button>
            <button type="submit" class="btn btn-primario">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div id="footer"></div>

  <script src="main.js"></script>
  <script src="../main.js"></script>
  <script>
    // Funciones para abrir y cerrar modales
    function openModal(modalId) {
      document.getElementById(modalId).style.display = 'block';
    }

    function closeModal(modalId) {
      document.getElementById(modalId).style.display = 'none';
    }

    // Cerrar modal al hacer clic fuera del contenido
    window.onclick = function (event) {
      const modals = document.getElementsByClassName('modal');
      for (let i = 0; i < modals.length; i++) {
        if (event.target == modals[i]) {
          modals[i].style.display = 'none';
        }
      }
    }
  </script>
</body>

</html>
