<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de Libros - Biblioteca UTHH</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="header"></div>

  <section class="hero">
    <h2>Catálogo de Libros</h2>
    <p>Explora nuestra completa colección bibliográfica</p>
  </section>

  <main>
    <div class="section-header">
      <h2>Nuestro Acervo Bibliográfico</h2>
    </div>

    <div class="search-section">
      <div class="search-box">
        <select class="filter-select" id="criterio-busqueda">
            <option value="titulo">Título</option>
            <option value="autor">Autor</option>
            <option value="genero">Género</option>
        </select>
        <div class="search-input-wrapper">
          <input type="text" class="search-input" id="input-busqueda" placeholder="Buscar por título, autor o género...">
          <button class="btn-mic" id="btnMic">
            <i class="fas fa-microphone"></i>
          </button>
        </div>
      </div>
    </div>
    
    <div class="catalogo" id="contenedor-libros"></div>

    <div class="container-main">
      <div class="paginacion-contenedor">
        <div class="paginacion-texto" id="textoPaginacion-container"></div>
        <button id="btnAnterior" class="btn btn-anterior">Anterior</button>
        <button id="btnSiguiente" class="btn btn-siguiente">Siguiente</button>
      </div>
    </div>
  </main>

  <div id="footer"></div>

  <script src="../main.js"></script>
  <script src="main.js"></script>
</body>
</html>
