<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Préstamos - Biblioteca UTHH</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../alert.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <div id="header"></div>
  <section class="hero">
    <h2>Sistema de Préstamos</h2>
  </section>
  <div id="header-dashboard"></div>
  <main>
    <div class="search-section">
      <div class="search-box">
        <span class="search-label">Buscar libro por título:</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Ingresa el título del libro...">
        <!--
          <button class="btn" id="btnBuscar"><i class="fas fa-search"></i> Buscar</button>
        -->
      </div>
    </div>
    
    <div class="table-container">
      <div class="tabla-scroll">
        <table class="catalog-table">
          <thead>
              <tr>
                <th>ID Libro</th>
                <th>Título</th>
                <th>Autor</th>
                <th>ID Ejemplar</th>
                <th>Número de ejemplar</th>
                <th>Estado</th>
              </tr>
          </thead>
          <tbody id="tblEjemplares">
          </tbody>
        </table>
      </div>
    </div>
    
    <div class="new-loan-section" id="formPrestamo">
      <h3 class="section-title">Nuevo préstamo</h3>
      <div class="loan-form">
        <div class="form-group">
          <label class="form-label" for="slcTipoUsuario">
            Tipo de usuario:
            <button type="button" class="config-btn" onclick="openModal('modal-tipos-usuario')" title="Configurar tipos de usuario">
              <i class="fas fa-cog"></i>
            </button>
          </label>
          <select class="form-select" id="slcTipoUsuario"></select>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="idLibro">ID libro:</label>
          <input type="text" class="form-input" id="idLibro" readonly>
          <input type="text" class="form-input" id="idEjemplar" hidden>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="inpIdUsuario">ID del usuario:</label>
          <input type="text" class="form-input" id="inpIdUsuario" title='Dar enter para buscar el usuario' placeholder="Ingresa ID del usuario">
        </div>
        
        <div class="form-group">
          <label class="form-label" for="titLibro">Título del libro:</label>
          <input type="text" class="form-input" id="titLibro" readonly>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="nombreUsuario">Nombre del usuario:</label>
          <input type="text" class="form-input" id="nombreUsuario" placeholder="Nombre completo" readonly>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="fechaPrestamo">Fecha de préstamo:</label>
          <input type="text" class="form-input" id="fechaPrestamo" readonly>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="slcTipoPrestamos">
            Tipo de préstamo:
            <button type="button" class="config-btn" onclick="openModal('modal-tipos-prestamo')" title="Configurar tipos de préstamo">
              <i class="fas fa-cog"></i>
            </button>
          </label>
          <select class="form-select" id="slcTipoPrestamos"></select>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="fechaDevolucion">Fecha de devolución:</label>
          <input type="text" class="form-input" id="fechaDevolucion" readonly>
        </div>
        
        <div class="form-actions">
          <button type="button" id="btnLimpiar" class="btn btn-secondary">Limpiar</button>
          <button type="button" id="btnPrestar" class="btn">Registrar Préstamo</button>
        </div>
      </div>
    </div>
  </main>

  <!-- Modal Tipos de Usuario -->
<div id="modal-tipos-usuario" class="modal">
    <div class="modal-content" style="padding:0; overflow:hidden; background:transparent; max-width:500px;">
        <iframe 
            src="tipo_usuarios/index.html" 
            style="width:100%; height:470px; border:none; display:block; border-radius:8px;">
        </iframe>
    </div>
</div>

  <!-- Modal Tipos de Préstamo -->
<div id="modal-tipos-prestamo" class="modal">
    <div class="modal-content" style="padding:0; overflow:hidden; background:transparent; max-width:500px;">
        <iframe 
            src="tipo_prestamos/index.html" 
            style="width:100%; height:470px; border:none; display:block; border-radius:8px;">
        </iframe>
    </div>
</div>

  <div id="footer"></div>

  <script src="../main.js"></script>
  <script src="main.js"></script>
  <script src="tipo_prestamos/main.js"></script>
  <script src="tipo_usuarios/main.js"></script>
  <script>
    // Funciones para abrir y cerrar modales
    function openModal(modalId) {
      if (localStorage.getItem('rol') !== 'ROL003') {
        mostrarAlerta({
          titulo: "Acceso denegado",
          texto: "No tienes permiso para configurar los tipos de usuario o préstamo.",
          tipo: "error",
        });
        return;
      }
      document.getElementById(modalId).style.display = 'block';
    }

    function closeModal(modalId) {
      document.getElementById(modalId).style.display = 'none';
    }

    // Cerrar modal al hacer clic fuera del contenido
    window.onclick = function(event) {
      const modals = document.getElementsByClassName('modal');
      for (let i = 0; i < modals.length; i++) {
        if (event.target == modals[i]) {
          modals[i].style.display = 'none';
        }
      }
    }

    // Manejo de envío de formularios
    document.getElementById('user-type-form').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Tipo de usuario guardado correctamente.');
      closeModal('modal-tipos-usuario');
    });

    document.getElementById('loan-type-form').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Tipo de préstamo guardado correctamente.');
      closeModal('modal-tipos-prestamo');
    });

    // Función para manejar la selección de filas en la tabla de tipos de préstamo
    document.querySelectorAll('#modal-tipos-prestamo table tbody tr').forEach(row => {
      row.addEventListener('click', function() {
        // Remover la clase selected-row de todas las filas
        document.querySelectorAll('#modal-tipos-prestamo table tbody tr').forEach(r => {
          r.classList.remove('selected-row');
        });
        // Agregar la clase selected-row a la fila clickeada
        this.classList.add('selected-row');
      });
    });
  </script>
</body>
</html>
