<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <title>Configurar Tipos de Préstamo</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"/>

</head>

<body>

<div class="modal-container">

    <div class="modal-card">


        <!-- HEADER -->

        <div class="modal-header">
        
            <h2>Configurar Tipos de Préstamo</h2>
        
            <button class="cerrar-modal" onclick="window.parent.closeModal('modal-tipos-prestamo')">
        
                ×
        
            </button>
        
        </div>


        <!-- BODY -->

        <div class="modal-body">

             <div id="mensajeExito" class="alert-success" style="display:none;"></div>

            <p class="label-strong">
                Tipos de préstamo existentes:
            </p>



            <!-- LISTA DE TIPOS DE PRÉSTAMO -->

            <div
                id="listaTiposPrestamo"
                class="lista-generos">

            </div>



            <!-- FORMULARIO -->

            <form
                id="formTipoPrestamo"
                class="form-principal">

                <label
                    for="nombreTipoPrestamo"
                    class="label-strong">

                    Tipo de préstamo:

                </label>

                <input
                    type="text"
                    id="nombreTipoPrestamo"
                    placeholder="Nuevo tipo de préstamo"
                >


                <input
                    type="hidden"
                    id="idTipoPrestamo"
                >



                <!-- BOTONES -->

                <div class="botones">

                    <button
                        type="button"
                        id="cancelarBtn"
                        class="btn btn-secundario">

                        Cancelar

                    </button>


                    <button
                        type="submit"
                        class="btn btn-primario">

                        Guardar

                    </button>

                </div>


            </form>

        </div>


    </div>

</div>


<script src="main.js"></script>

</body>

</html>
