<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de Libros - Biblioteca UTHH</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../alert.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

  <div id="header"></div>

  <!-- CONTROLES ZOOM -->
  <div class="zoom-controls">
    <button class="zoom-btn" id="zoomOut"><i class="fas fa-search-minus"></i></button>
    <span class="zoom-display" id="zoomLevel">100%</span>
    <button class="zoom-btn" id="zoomIn"><i class="fas fa-search-plus"></i></button>
    <button class="zoom-btn zoom-reset" id="zoomReset">
      <i class="fas fa-sync-alt"></i>
    </button>
  </div>

  <section class="hero">
    <h2>Catálogo de Libros</h2>
  </section>

  <div id="header-dashboard"></div>

  <main>

    <div class="search-section">
      <div class="search-box">
        <span class="search-label">Buscar libro:</span>

        <select class="filter-select" id="filterSelect">
          <option value="id">ID del libro</option>
          <option value="titulo">Título</option>
          <option value="isbn">ISBN</option>
        </select>

        <input type="text" class="search-input" id="searchInput" placeholder="Ingresa término de búsqueda...">
      </div>
    </div>

    <button class="btn-agregar" id="btnAgregar" onclick="abrirModal('./guardarLibros/index.html')">
      <i class="fas fa-plus"></i>
      <span>Agregar Nuevo Libro</span>
    </button>

    <div class="table-container">
      <div class="tabla-scroll">
        <table class="catalog-table">
          <thead>
            <tr>
              <th>Imagen</th>
              <th>ID Libro</th>
              <th>Título</th>
              <th>Autor</th>
              <th>Género</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody class="table-libros" id="tablaLibros">
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <!-- MODAL -->
  <div id="modalLibros" class="modal">
    <div class="modal-content">
      <iframe id="modalIframe" class="modal-iframe"></iframe>
    </div>
  </div>

  <div id="footer"></div>

  <script src="../main.js"></script>
  <script src="main.js"></script>
  <script>
    function closeAllModals() {
      const modals = document.getElementsByClassName('modal');
      for (let i = 0; i < modals.length; i++) {
        modals[i].style.display = 'none';
      }
    }
  </script>
</body>
</html>
