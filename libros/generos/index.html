<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Configurar Géneros</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        crossorigin="anonymous" />
</head>

<body>

    <div class="modal-container">

        <div class="modal-card">

            <div class="modal-header">
                <h2>Configurar Géneros</h2>
                <span class="cerrar">×</span>
            </div>

            <div class="modal-body">

                <div id="mensajeExito" class="alert-success" style="display:none;"></div>

                <p class="label-strong">Géneros existentes:</p>

                <div id="listaGeneros" class="lista-items">
                    <!-- aquí carga JS -->
                </div>

                <h3 id="tituloForm">Agregar género</h3>

                <form id="formGenero" class="form-principal">

                    <label class="label-strong">Nombre del género:</label>

                    <input type="text" id="nombreGenero" placeholder="Nuevo género">

                    <input type="hidden" id="idGenero">

                    <div class="botones">

                        <button type="button" id="cancelarBtn" class="btn btn-secundario">
                            Cancelar
                        </button>

                        <button type="submit" class="btn btn-primario">
                            Agregar
                        </button>

                    </div>

                </form>

            </div>
        </div>
    </div>

    <script src="main.js"></script>

</body>

</html>
