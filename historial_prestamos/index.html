<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historial de Préstamos - Biblioteca UTHH</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="header"></div>

  <section class="hero">
    <h2>Historial de Préstamos</h2>
    <p>Consulta tu historial de libros prestados</p>
  </section>

  <div id="header-dashboard"></div>

  <main>

    <!-- HEADER -->
    <div class="section-header">
      <h2>Mis Préstamos</h2>
      <p>Revisa el estado de todos los libros que has solicitado</p>
    </div>

    <!-- USUARIO -->
    <div class="user-info-card">
      <div class="user-avatar">
        <i class="fas fa-user"></i>
      </div>
      <div class="user-details">
        <h3 id="nombreUsuario"></h3>
        <p id="tipoUsuario"></p>
      </div>
    </div>

    <!-- ESTADÍSTICAS -->
    <div class="stats-cards">
      <div class="stat-card">
        <div class="stat-number" id="prestamosTotales">0</div>
        <div class="stat-label">Préstamos Totales</div>
      </div>

      <div class="stat-card">
        <div class="stat-number" id="librosActivos">0</div>
        <div class="stat-label">Libros Activos</div>
      </div>

      <div class="stat-card">
        <div class="stat-number" id="librosDevueltos">0</div>
        <div class="stat-label">Libros Devueltos</div>
      </div>
    </div>

    <!-- LISTA DE PRÉSTAMOS -->
    <div class="prestamos-grid" id="prestamosContainer">
      <!-- Aquí se insertan las tarjetas dinámicamente -->
    </div>

  </main>

  <div id="footer"></div>

  <script src="../main.js"></script>
  <script src="main.js"></script>

</body>
</html>
